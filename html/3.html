<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Disaster Coordination Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "margin-mobile": "16px",
                    "stack-gap": "8px",
                    "gutter": "12px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],

                    "label-bold": ["Inter"],

                    "body-lg": ["Inter"]
            },
            "fontSize": {

                    "status-number": ["32px", {"lineHeight": "40px", "fontWeight": "800"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest text-primary-container h-screen w-full flex flex-col overflow-hidden antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b-2 border-gray-900 dark:border-gray-50 bg-white dark:bg-gray-950 flex items-center justify-between px-4 h-14 z-50 transition-transform scale-95 duration-75">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-gray-900 dark:text-gray-50" data-icon="signal_cellular_alt_2_bar">signal_cellular_alt_2_bar</span>
</div>
<div class="font-black text-lg tracking-widest text-gray-900 dark:text-gray-50">RESPONDER</div>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<!-- Persistent Network Status Banner -->
<div class="fixed top-[56px] w-full bg-[#f3f4f6] border-b-2 border-[#1f2937] z-40 px-4 py-3 flex items-start gap-3">
<span class="material-symbols-outlined text-error" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
<div>
<div class="font-label-bold text-label-bold text-error">OFFLINE MODE</div>
<div class="font-body-md text-body-md text-on-surface-variant mt-1">Changes will sync when connection is restored</div>
</div>
</div>
<!-- Main Content Area (Live Coordination Map Placeholder) -->
<main class="flex-1 mt-[112px] mb-[64px] relative bg-surface-container w-full h-full">
<!-- Map Background (Placeholder) -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center opacity-30 mix-blend-multiply" data-alt="High contrast satellite map view of an urban area with distinct street layouts, desaturated colors suitable for data overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBd27Q61mpKwgUlbitGO4ttVjRbyz1kAVm-xexrb9OhmW8qiZaYDjbpDGYhlWbmQaSRbgfDEvQdIbgbNMHk3RnrpI7uFz348IhUxR4pHj08CTCBwj-pLzMuU5z4KOzdxn6g2v3kBbHV92AMtNQKiJbE6PlXcZKGIJzSNRLs5AFQLltIcmsf_GgNa8Duw_SBCDqbiPk5ClXYAgL6ENf6pZBkd7_6AQUUsJP6eBI-ar8YUjfd2l1qIekvUybGg_9jpj53KotQ6eDBYVM');"></div>
<div class="absolute inset-0 w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-transparent to-surface-container-lowest/20 pointer-events-none"></div>
<!-- Simulated Map Data Points -->
<div class="absolute top-[20%] left-[30%] w-4 h-4 bg-error rounded-full border-2 border-surface-container-lowest shadow-sm"></div>
<div class="absolute top-[45%] left-[60%] w-4 h-4 bg-[#0051d5] rounded-full border-2 border-surface-container-lowest shadow-sm"></div>
<div class="absolute top-[70%] left-[40%] w-4 h-4 bg-error rounded-full border-2 border-surface-container-lowest shadow-sm"></div>
<!-- High-Contrast UI Controls -->
<div class="absolute right-margin-mobile top-4 flex flex-col gap-stack-gap">
<button class="w-touch-target-min h-touch-target-min bg-surface-container-lowest border border-primary-container text-primary-container flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-touch-target-min h-touch-target-min bg-surface-container-lowest border border-primary-container text-primary-container flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-touch-target-min h-touch-target-min bg-surface-container-lowest border border-primary-container text-primary-container flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm mt-4">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Incident Summary Overlay (Bottom) -->
<div class="absolute bottom-margin-mobile left-margin-mobile right-margin-mobile bg-surface-container-lowest border border-primary-container p-4 shadow-sm flex flex-col gap-stack-gap">
<div class="flex justify-between items-center">
<span class="font-label-bold text-label-bold text-primary-container uppercase tracking-wide">Active Incidents</span>
<span class="bg-error text-on-error px-2 py-0.5 text-[12px] font-bold">3 CRITICAL</span>
</div>
<div class="h-[1px] w-full bg-surface-container-highest"></div>
<div class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-error"></span> Zone A - Structural Collapse
            </div>
</div>
<!-- Floating Action Button (FAB) -->
<button class="absolute bottom-[100px] right-margin-mobile w-14 h-14 bg-error text-on-error flex items-center justify-center shadow-md hover:bg-[#93000a] transition-colors border-2 border-transparent z-40">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-16 z-50 flex justify-around items-stretch bg-white dark:bg-gray-950 border-t-2 border-gray-900 dark:border-gray-50 md:hidden">
<!-- Active Nav Item: Map -->
<a class="flex flex-col items-center justify-center bg-gray-900 dark:bg-gray-50 text-white dark:text-gray-900 w-full h-full hover:bg-gray-200 dark:hover:bg-gray-800 press-down transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="map" data-weight="fill" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="text-[10px] font-bold uppercase tracking-wide mt-1">Map</span>
</a>
<!-- Inactive Nav Item: Feed -->
<a class="flex flex-col items-center justify-center text-gray-900 dark:text-gray-50 w-full h-full hover:bg-gray-200 dark:hover:bg-gray-800 press-down transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="dynamic_feed">dynamic_feed</span>
<span class="text-[10px] font-bold uppercase tracking-wide mt-1">Feed</span>
</a>
<!-- Inactive Nav Item: Profile -->
<a class="flex flex-col items-center justify-center text-gray-900 dark:text-gray-50 w-full h-full hover:bg-gray-200 dark:hover:bg-gray-800 press-down transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-bold uppercase tracking-wide mt-1">Profile</span>
</a>
</nav>
<!-- Desktop Sidebar Placeholder (Hidden on Mobile) -->
<aside class="hidden md:flex flex-col w-64 h-full border-r-2 border-gray-900 dark:border-gray-50 bg-white dark:bg-gray-950 fixed left-0 top-[56px] pt-12 px-4 z-40">
<div class="font-label-bold text-label-bold text-outline-variant mb-4 uppercase">Navigation</div>
<a class="flex items-center gap-3 p-3 bg-gray-900 text-white font-label-bold text-label-bold mb-2" href="#">
<span class="material-symbols-outlined" data-icon="map" data-weight="fill" style="font-variation-settings: 'FILL' 1;">map</span> Map
         </a>
<a class="flex items-center gap-3 p-3 text-gray-900 font-label-md text-label-md hover:bg-gray-100 mb-2" href="#">
<span class="material-symbols-outlined" data-icon="dynamic_feed">dynamic_feed</span> Feed
         </a>
<a class="flex items-center gap-3 p-3 text-gray-900 font-label-md text-label-md hover:bg-gray-100" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span> Profile
         </a>
</aside>
</body></html>
