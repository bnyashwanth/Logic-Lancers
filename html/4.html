<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Resource Request Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1f2937",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#f8dfbf",
                        "inverse-primary": "#bdc7d9",
                        "on-secondary-fixed": "#00174b",
                        "primary-fixed-dim": "#bdc7d9",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-container": "#342611",
                        "surface": "#f8f9fb",
                        "secondary-fixed": "#dbe1ff",
                        "tertiary-fixed-dim": "#dbc3a4",
                        "outline": "#75777c",
                        "surface-container-highest": "#e1e2e4",
                        "background": "#f8f9fb",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#a28c70",
                        "inverse-on-surface": "#f0f1f3",
                        "surface-bright": "#f8f9fb",
                        "surface-container-high": "#e7e8ea",
                        "outline-variant": "#c5c6cc",
                        "on-primary-container": "#8690a1",
                        "on-tertiary-fixed-variant": "#55442d",
                        "on-error-container": "#93000a",
                        "secondary": "#0051d5",
                        "surface-dim": "#d9dadc",
                        "on-surface-variant": "#44474c",
                        "tertiary": "#1d1202",
                        "error": "#ba1a1a",
                        "on-background": "#191c1e",
                        "inverse-surface": "#2e3132",
                        "surface-container": "#edeef0",
                        "primary-fixed": "#d9e3f6",
                        "primary": "#0a1422",
                        "on-primary-fixed": "#121c2a",
                        "on-secondary-container": "#fefcff",
                        "on-tertiary-fixed": "#261906",
                        "surface-variant": "#e1e2e4",
                        "secondary-container": "#316bf3",
                        "surface-tint": "#555f6f",
                        "on-primary-fixed-variant": "#3d4756",
                        "surface-container-low": "#f3f4f6",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-secondary-fixed-variant": "#003ea8",
                        "on-surface": "#191c1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "touch-target-min": "48px",
                        "margin-mobile": "16px",
                        "stack-gap": "8px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "status-number": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "status-number": ["32px", { "lineHeight": "40px", "fontWeight": "800" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen antialiased flex flex-col font-body-md text-body-md pt-14 pb-16">
<!-- TopAppBar Semantic Shell -->
<header class="fixed top-0 w-full border-b-2 border-gray-900 bg-white flex items-center justify-between px-4 h-14 z-50">
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-10 h-10 hover:bg-gray-100 scale-95 duration-75 text-gray-900">
<span class="material-symbols-outlined" data-icon="signal_cellular_alt_2_bar">signal_cellular_alt_2_bar</span>
</button>
<span class="font-black text-lg tracking-widest text-gray-900 uppercase">RESPONDER</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile py-stack-gap">
<div class="mb-gutter mt-stack-gap">
<h1 class="font-headline-lg text-headline-lg text-on-background">Request Resources</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Submit an immediate request to dispatch coordination.</p>
</div>
<form class="flex flex-col gap-gutter">
<!-- Request Type Dropdown -->
<div class="flex flex-col gap-1">
<label class="font-label-bold text-label-bold text-on-surface" for="request_type">Request Type</label>
<div class="relative">
<select class="w-full h-touch-target-min border border-primary-container bg-surface-container-lowest text-on-surface font-body-md text-body-md rounded-DEFAULT px-3 appearance-none focus:outline-none focus:ring-0 focus:border-secondary focus:border-[3px]" id="request_type">
<option disabled="" selected="" value="">Select category...</option>
<option value="medical">Medical</option>
<option value="food">Food &amp; Water</option>
<option value="rescue">Rescue Operations</option>
<option value="other">Other Supplies</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Description Textarea -->
<div class="flex flex-col gap-1">
<label class="font-label-bold text-label-bold text-on-surface" for="description">Description &amp; Quantity</label>
<textarea class="w-full border border-primary-container bg-surface-container-lowest text-on-surface font-body-md text-body-md rounded-DEFAULT p-3 focus:outline-none focus:ring-0 focus:border-secondary focus:border-[3px]" id="description" placeholder="Detail specific needs, quantities, and current situational status..." rows="4"></textarea>
</div>
<!-- Urgency Level Selector -->
<div class="flex flex-col gap-1">
<label class="font-label-bold text-label-bold text-on-surface mb-1">Urgency Level</label>
<div class="grid grid-cols-2 gap-2">
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="low"/>
<div class="h-touch-target-min flex items-center justify-center border border-primary-container bg-surface-container-lowest text-on-surface font-label-md text-label-md peer-checked:bg-primary-container peer-checked:text-on-primary rounded-DEFAULT">
                            Low
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="medium"/>
<div class="h-touch-target-min flex items-center justify-center border border-primary-container bg-surface-container-lowest text-on-surface font-label-md text-label-md peer-checked:bg-primary-container peer-checked:text-on-primary rounded-DEFAULT">
                            Medium
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="high"/>
<div class="h-touch-target-min flex items-center justify-center border border-primary-container bg-surface-container-lowest text-on-surface font-label-md text-label-md peer-checked:bg-error peer-checked:border-error peer-checked:text-on-error rounded-DEFAULT">
                            High
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="critical"/>
<div class="h-touch-target-min flex items-center justify-center border-[3px] border-error bg-error text-on-error font-label-bold text-label-bold peer-checked:bg-on-error-container peer-checked:border-on-error-container peer-checked:text-on-error rounded-DEFAULT">
                            CRITICAL
                        </div>
</label>
</div>
</div>
<!-- Location Section -->
<div class="flex flex-col gap-1 mt-stack-gap">
<label class="font-label-bold text-label-bold text-on-surface">Dispatch Location</label>
<button class="h-touch-target-min w-full flex items-center justify-center gap-2 border border-primary-container bg-surface-container-low text-on-surface font-label-md text-label-md hover:bg-surface-variant rounded-DEFAULT" type="button">
<span class="material-symbols-outlined text-on-surface" data-icon="my_location">my_location</span>
                    Use Current Location
                </button>
<div class="text-label-md font-label-md text-outline mt-1 px-1">
                    Or enter coordinates manually below.
                </div>
</div>
<!-- Primary CTA -->
<div class="mt-gutter pb-gutter">
<button class="w-full h-touch-target-min bg-primary-container text-on-primary font-label-bold text-label-bold rounded-DEFAULT flex items-center justify-center gap-2 active:bg-primary" type="submit">
<span class="material-symbols-outlined" data-icon="send">send</span>
                    Post Request
                </button>
</div>
</form>
</main>
<!-- BottomNavBar Semantic Shell - Suppressed on transactional page -->
<!-- Navigation intentionally omitted to prioritize focused form completion -->
</body></html>
